<html lang="es">
<head>
<meta charset="UTF-8">

<title>Pasapalabra — Federico y Begoña</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Georgia,serif; background:#FFF8F0; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:16px; }

/* ── BIENVENIDA ── */
#pantalla-bienvenida { width:100%; max-width:900px; }
.bienvenida-titulo { text-align:center; font-size:36px; color:#5C3D1E; margin:20px 0 8px; }
.bienvenida-sub { text-align:center; font-size:18px; color:#8B6340; margin-bottom:30px; }
.jugadores-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; max-width:500px; margin:0 auto 28px; }
.jugador-btn { background:white; border:3px solid #E8D5B7; border-radius:20px; padding:32px 16px; text-align:center; cursor:pointer; transition:transform 0.15s,border-color 0.15s; }
.jugador-btn:hover { transform:scale(1.04); border-color:#C97B2A; }
.jugador-icono { font-size:60px; display:block; margin-bottom:12px; }
.jugador-nombre { font-size:26px; color:#5C3D1E; font-weight:bold; }
.btn-ranking-bienvenida { display:block; margin:0 auto 10px; font-size:17px; background:transparent; border:2px solid #C97B2A; color:#C97B2A; border-radius:12px; padding:10px 24px; cursor:pointer; font-family:Georgia,serif; }
.btn-ranking-bienvenida:hover { background:#C97B2A; color:white; }
.btn-volver-inicio { display:block; margin:10px auto 0; font-size:15px; background:transparent; border:2px solid #8B6340; color:#8B6340; border-radius:10px; padding:8px 20px; cursor:pointer; font-family:Georgia,serif; }
.btn-volver-inicio:hover { background:#8B6340; color:white; }

/* ── SELECCIÓN DE ROSCOS ── */
#pantalla-roscos { display:none; width:100%; max-width:900px; }
.saludo-roscos { text-align:center; font-size:26px; color:#5C3D1E; margin:10px 0 4px; }
.sub-roscos { text-align:center; font-size:16px; color:#8B6340; margin-bottom:20px; }
.roscos-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:20px; }
.rosco-card { background:white; border:3px solid #E8D5B7; border-radius:16px; padding:18px 10px; text-align:center; cursor:pointer; transition:transform 0.15s,border-color 0.15s; position:relative; }
.rosco-card.desbloqueado:hover { transform:scale(1.04); border-color:#C97B2A; }
.rosco-card.bloqueado { opacity:0.45; cursor:not-allowed; }
.rosco-card.completado { border-color:#4CAF50; background:#F1FBF3; }
.rosco-num { font-size:32px; font-weight:bold; color:#5C3D1E; }
.rosco-dif { font-size:13px; color:#8B6340; margin:4px 0; }
.rosco-estrellas { font-size:16px; }
.rosco-mejor { font-size:12px; color:#4CAF50; margin-top:4px; font-weight:bold; }
.candado { font-size:28px; }

/* ── JUEGO ── */
#pantalla-juego { display:none; width:100%; max-width:900px; }
.cabecera-juego { display:flex; align-items:center; gap:12px; margin-bottom:16px; padding-bottom:14px; border-bottom:2px solid #E8D5B7; }
.btn-volver { font-size:17px; background:#FFF8F0; border:2px solid #C97B2A; color:#C97B2A; border-radius:10px; padding:8px 14px; cursor:pointer; font-family:Georgia,serif; }
.btn-volver:hover { background:#C97B2A; color:white; }
.titulo-juego { font-size:24px; color:#5C3D1E; }
.jugador-badge { font-size:15px; color:#8B6340; margin-left:auto; }
.info-pp { text-align:center; font-size:17px; color:#8B6340; margin-bottom:10px; }
.juego-layout { display:grid; grid-template-columns:auto 1fr; gap:20px; align-items:start; }
.columna-rosco { display:flex; flex-direction:column; align-items:center; }
.columna-controles { display:flex; flex-direction:column; }
#pregunta-pp { background:white; border:3px solid #E8D5B7; border-radius:14px; padding:16px 20px; font-size:20px; color:#5C3D1E; text-align:center; min-height:72px; line-height:1.5; margin-bottom:12px; }
#respuesta-actual { font-size:24px; color:#C97B2A; text-align:center; min-height:34px; margin-bottom:10px; letter-spacing:3px; font-weight:bold; }
.msg-pp { text-align:center; font-size:20px; color:#5C3D1E; min-height:30px; margin-bottom:10px; }
.teclado-fila { display:flex; gap:5px; justify-content:center; margin-bottom:5px; }
.tecla { font-size:17px; font-weight:bold; background:white; border:2px solid #C97B2A; border-radius:8px; width:42px; height:42px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#5C3D1E; font-family:Georgia,serif; }
.tecla:hover { background:#FFE0B2; }
.tecla:disabled { background:#E8D5B7; border-color:#E8D5B7; color:#B0A090; cursor:default; }
.botones-pp { display:flex; gap:10px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
.btn-pp { font-size:17px; border:none; border-radius:12px; padding:12px 22px; cursor:pointer; font-family:Georgia,serif; color:white; }
.btn-confirmar { background:#2E7D32; font-size:19px; padding:14px 28px; border-radius:14px; letter-spacing:0.5px; }
.btn-confirmar:hover { background:#1B5E20; }
.btn-borrar-pp { background:#5C3D1E; font-size:17px; padding:12px 20px; border-radius:10px; }
.btn-borrar-pp:hover { background:#3E2A14; }
.btn-pasa { background:#E65100; font-size:19px; padding:14px 28px; border-radius:14px; letter-spacing:0.5px; }
.btn-pasa:hover { background:#BF360C; }
.btn-rindo { background:#6A1B9A; font-size:17px; padding:12px 22px; border-radius:12px; display:none; }
.btn-rindo:hover { background:#4A148C; }

/* ── RANKING ── */
#pantalla-ranking { display:none; width:100%; max-width:860px; }
.ranking-titulo { text-align:center; font-size:28px; color:#5C3D1E; margin-bottom:20px; }
.ranking-tabla { width:100%; border-collapse:collapse; font-size:16px; }
.ranking-tabla th { background:#C97B2A; color:white; padding:12px; text-align:center; }
.ranking-tabla td { padding:10px 14px; border-bottom:1px solid #E8D5B7; text-align:center; color:#5C3D1E; }
.ranking-tabla tr:nth-child(even) td { background:#FFF3E0; }
.btn-reset { display:block; margin:20px auto 0; font-size:16px; background:transparent; border:2px solid #E57373; color:#E57373; border-radius:10px; padding:10px 24px; cursor:pointer; font-family:Georgia,serif; }
.btn-reset:hover { background:#FFCDD2; }

/* ── FIN ROSCO ── */
#pantalla-fin { display:none; width:100%; max-width:700px; text-align:center; padding:20px; }
.fin-emoji { font-size:64px; margin-bottom:14px; }
.fin-titulo { font-size:28px; color:#5C3D1E; margin-bottom:10px; }
.fin-puntos { font-size:22px; color:#8B6340; margin-bottom:10px; }
.fin-desbloqueo { font-size:18px; color:#4CAF50; margin-bottom:24px; font-weight:bold; }
.btn-fin { display:inline-block; margin:6px; font-size:18px; background:#C97B2A; color:white; border:none; border-radius:12px; padding:12px 28px; cursor:pointer; font-family:Georgia,serif; }
.btn-fin:hover { background:#A0621E; }
.btn-fin-sec { background:#8B6340; }
.btn-fin-sec:hover { background:#5C3D1E; }

footer { text-align:center; padding:24px 0 8px; font-size:15px; color:#8B6340; font-family:Georgia,serif; margin-top:16px; }
</style>

// ══ RANKING ══
function getRanking() { try { return JSON.parse(localStorage.getItem('ranking_pp')) || {}; } catch(e) { return {}; } }
function saveRanking(r) { localStorage.setItem('ranking_pp', JSON.stringify(r)); }
function getDesbloqueados(nombre) {
  const r = getRanking();
  if (!r[nombre]) return [0];
  const desbloqueados = [0];
  for (let i = 0; i < ROSCOS.length - 1; i++) {
    const mejor = r[nombre]?.roscos?.[i]?.mejor || 0;
    if (mejor >= MIN_DESBLOQUEO) desbloqueados.push(i + 1);
    else break;
  }
  return desbloqueados;
}
function guardarResultadoRosco(nombre, roscoIdx, aciertos) {
  const r = getRanking();
  if (!r[nombre]) r[nombre] = { roscos: {} };
  if (!r[nombre].roscos) r[nombre].roscos = {};
  const prev = r[nombre].roscos[roscoIdx] || { mejor: 0, partidas: 0 };
  r[nombre].roscos[roscoIdx] = {
    mejor: Math.max(prev.mejor, aciertos),
    partidas: prev.partidas + 1,
    ultimo: aciertos,
  };
  saveRanking(r);
}

// ══ NAVEGACIÓN ══
function mostrarPantalla(id) {
  ['pantalla-bienvenida','pantalla-roscos','pantalla-juego','pantalla-fin','pantalla-ranking']
    .forEach(p => document.getElementById(p).style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

function elegirJugador(nombre, icono) {
  jugador = { nombre, icono };
  mostrarPantalla('pantalla-roscos');
  document.getElementById('saludo-roscos').textContent = icono + ' ¡Hola ' + nombre + '! Elige tu rosco';
  renderizarRoscos();
}

function volverBienvenida() { mostrarPantalla('pantalla-bienvenida'); }
function volverRoscos() { mostrarPantalla('pantalla-roscos'); renderizarRoscos(); }

function renderizarRoscos() {
  const desbloqueados = getDesbloqueados(jugador.nombre);
  const r = getRanking();
  const cont = document.getElementById('roscos-grid');
  cont.innerHTML = '';
  ROSCOS.forEach((rosco, i) => {
    const desbloqueado = desbloqueados.includes(i);
    const mejor = r[jugador.nombre]?.roscos?.[i]?.mejor || 0;
    const completado = mejor >= MIN_DESBLOQUEO;
    const card = document.createElement('div');
    card.className = 'rosco-card ' + (desbloqueado ? 'desbloqueado' : 'bloqueado') + (completado ? ' completado' : '');
    card.innerHTML = desbloqueado
      ? `<div class="rosco-num">${i + 1}</div>
         <div class="rosco-dif">${rosco.dif}</div>
         <div class="rosco-estrellas">${rosco.estrellas}</div>
         ${mejor > 0 ? `<div class="rosco-mejor">Mejor: ${mejor}/26</div>` : ''}`
      : `<div class="candado">🔒</div><div class="rosco-dif">${rosco.dif}</div><div class="rosco-estrellas">${rosco.estrellas}</div>`;
    if (desbloqueado) card.onclick = () => iniciarRosco(i);
    cont.appendChild(card);
  });
}

// ══ JUEGO ══
function iniciarRosco(idx) {
  roscoActual = idx;
  ppEstado = {};
  LETRAS.forEach(l => ppEstado[l] = 'pendiente');
  ppOrden = [...LETRAS];
  ppIdx = 0; ppAcertadas = 0; ppFalladas = 0; ppRespuesta = [];
  primeraVueltaCompleta = false; preguntasRespondidas = 0;
  document.getElementById('titulo-juego').textContent = '🎡 ' + ROSCOS[idx].titulo;
  document.getElementById('badge-juego').textContent = jugador.icono + ' ' + jugador.nombre;
  document.getElementById('msg-pp').textContent = '';
  document.getElementById('btn-confirmar').style.display = 'inline-block';
  document.getElementById('btn-pasa').style.display = 'inline-block';
  document.getElementById('btn-borrar-pp').style.display = 'inline-block';
  document.getElementById('btn-rindo').style.display = 'none';
  document.getElementById('pregunta-pp').style.display = 'block';
  document.getElementById('teclado-pp').style.display = 'block';
  construirTeclado();
  mostrarPantalla('pantalla-juego');
  mostrarPregunta();
  setTimeout(() => dibujarRosco(), 100);
}
 

function letraActual() { return ppOrden[ppIdx]; }

function mostrarPregunta() {
  const l = letraActual();
  const q = ROSCOS[roscoActual].preguntas[l];
  ppRespuesta = [];
  document.getElementById('respuesta-actual').textContent = '';
  document.getElementById('msg-pp').textContent = '';
  document.getElementById('pregunta-pp').textContent = q.p;
  document.getElementById('info-pp').textContent =
    '✅ ' + ppAcertadas + '  ❌ ' + ppFalladas + '  —  Letra: ' + l + '  —  ' + ROSCOS[roscoActual].dif;
  habilitarTeclado(true);
}

function construirTeclado() {
  const filas = [['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L','Ñ'],['Z','X','C','V','B','N','M']];
  const cont = document.getElementById('teclado-pp'); cont.innerHTML = '';
  filas.forEach(fila => {
    const div = document.createElement('div'); div.className = 'teclado-fila';
    fila.forEach(l => {
      const b = document.createElement('button'); b.className = 'tecla'; b.textContent = l; b.id = 'tecla-' + l;
      b.onclick = () => pulsarTecla(l); div.appendChild(b);
    });
    cont.appendChild(div);
  });
}

function habilitarTeclado(on) { document.querySelectorAll('.tecla').forEach(b => b.disabled = !on); }
function pulsarTecla(l) { ppRespuesta.push(l); document.getElementById('respuesta-actual').textContent = ppRespuesta.join(''); }
function borrarLetra() { if (!ppRespuesta.length) return; ppRespuesta.pop(); document.getElementById('respuesta-actual').textContent = ppRespuesta.join(''); }

function normalizar(s) { return s.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }

function confirmar() {
  const l = letraActual();
  const q = ROSCOS[roscoActual].preguntas[l];
  const resp = normalizar(ppRespuesta.join(''));
  if (!resp) return;
  const correctas = [q.r, ...(q.alt || [])].map(normalizar);
  const ok = correctas.some(c => resp === c || (resp.length >= 4 && (c.includes(resp) || resp.includes(c))));
  habilitarTeclado(false);
  preguntasRespondidas++;
  if (!primeraVueltaCompleta && preguntasRespondidas >= LETRAS.length) {
    primeraVueltaCompleta = true;
    document.getElementById('btn-rindo').style.display = 'inline-block';
  }
  if (ok) {
    ppEstado[l] = 'acierto'; ppAcertadas++;
    document.getElementById('msg-pp').textContent = '✅ ¡Correcto! — ' + q.r;
  } else {
    ppEstado[l] = 'fallo'; ppFalladas++;
    document.getElementById('msg-pp').textContent = '❌ Era: ' + q.r;
  }
  dibujarRosco();
  const pendientes = ppOrden.filter(x => ppEstado[x] === 'pendiente' || ppEstado[x] === 'pasada');
  if (pendientes.length === 0) { setTimeout(finRosco, 1400); return; }
  setTimeout(() => { avanzar(); document.getElementById('msg-pp').textContent = ''; }, 1800);
}

function pasar() {
  const l = letraActual();
  ppEstado[l] = 'pasada';
  preguntasRespondidas++;
  if (!primeraVueltaCompleta && preguntasRespondidas >= LETRAS.length) {
    primeraVueltaCompleta = true;
    document.getElementById('btn-rindo').style.display = 'inline-block';
  }
  document.getElementById('msg-pp').textContent = '⏭ Pasada...';
  dibujarRosco();
  const pendientes = ppOrden.filter(x => ppEstado[x] === 'pendiente' || ppEstado[x] === 'pasada');
  if (pendientes.length === 0) { setTimeout(finRosco, 800); return; }
  setTimeout(() => { avanzar(); document.getElementById('msg-pp').textContent = ''; }, 700);
}

function avanzar() {
  for (let i = 1; i <= ppOrden.length; i++) {
    const idx = (ppIdx + i) % ppOrden.length;
    if (ppEstado[ppOrden[idx]] === 'pendiente' || ppEstado[ppOrden[idx]] === 'pasada') {
      ppIdx = idx; mostrarPregunta(); return;
    }
  }
  finRosco();
}

function meRindo() {
  if (!confirm('¿Seguro que os rendís? Se mostrarán todas las respuestas pendientes.')) return;

  habilitarTeclado(false);
  document.getElementById('btn-rindo').style.display = 'none';
  document.getElementById('btn-pasa').style.display = 'none';
  document.getElementById('btn-confirmar').style.display = 'none';
  document.getElementById('btn-borrar-pp').style.display = 'none';
  document.getElementById('respuesta-actual').textContent = '';
  document.getElementById('msg-pp').textContent = '';

  const pendientes = ppOrden.filter(l => ppEstado[l] === 'pendiente' || ppEstado[l] === 'pasada');
  pendientes.forEach(l => ppEstado[l] = 'fallo');
  dibujarRosco();
  guardarResultadoRosco(jugador.nombre, roscoActual, ppAcertadas);

  let html = '<div style="text-align:left">';
  html += '<div style="font-size:18px;font-weight:bold;color:#5C3D1E;margin-bottom:12px;text-align:center">📖 Soluciones pendientes</div>';
  pendientes.forEach(l => {
    const q = ROSCOS[roscoActual].preguntas[l];
    const pregunta = q.p.replace(/^(Empieza por [A-ZÑ]|Contiene la [A-ZÑ]) — /, '');
    html += '<div style="margin-bottom:10px;font-size:15px;color:#5C3D1E;border-bottom:1px solid #E8D5B7;padding-bottom:8px">'
      + '<strong style="color:#C97B2A;font-size:17px">' + l + '</strong> — ' + pregunta
      + '<br><span style="color:#2E7D32;font-weight:bold">✅ ' + q.r + '</span></div>';
  });
  html += '</div>';
  document.getElementById('pregunta-pp').innerHTML = html;

  const btnVolver = document.createElement('button');
  btnVolver.className = 'btn-pp btn-pasa';
  btnVolver.style.marginTop = '14px';
  btnVolver.style.display = 'block';
  btnVolver.style.margin = '14px auto 0';
  btnVolver.textContent = '📋 Volver a los roscos';
  btnVolver.onclick = volverRoscos;
  document.querySelector('.botones-pp').appendChild(btnVolver);
}

function finRosco() {
  habilitarTeclado(false);
  guardarResultadoRosco(jugador.nombre, roscoActual, ppAcertadas);
  dibujarRosco();
  mostrarPantalla('pantalla-fin');
  const pct = Math.round(ppAcertadas / 26 * 100);
  const emojis = pct === 100 ? '🏆' : pct >= 75 ? '🎉' : pct >= 50 ? '👏' : '💪';
  const msgs = pct === 100 ? '¡Rosco perfecto!' : pct >= 75 ? '¡Extraordinario!' : pct >= 50 ? '¡Muy bien!' : '¡A seguir practicando!';
  document.getElementById('fin-emoji').textContent = emojis;
  document.getElementById('fin-titulo').textContent = '¡' + jugador.nombre + '! ' + msgs;
  document.getElementById('fin-puntos').textContent = '✅ ' + ppAcertadas + ' acertadas  ❌ ' + ppFalladas + ' falladas';
  const desbloquea = ppAcertadas >= MIN_DESBLOQUEO && roscoActual < ROSCOS.length - 1;
  document.getElementById('fin-desbloqueo').textContent = desbloquea
    ? '🔓 ¡Has desbloqueado el Rosco ' + (roscoActual + 2) + '!'
    : ppAcertadas < MIN_DESBLOQUEO ? '⚠️ Necesitas ' + MIN_DESBLOQUEO + ' aciertos para desbloquear el siguiente' : '';
}

function repetirRosco() { iniciarRosco(roscoActual); }

// ══ ROSCO VISUAL ══
function dibujarRosco() {
  const canvas = document.getElementById('rosco-canvas');
  const ctx = canvas.getContext('2d');
  const cx = 150, cy = 150, r = 128;
  ctx.clearRect(0, 0, 300, 300);
  const n = LETRAS.length;
  LETRAS.forEach((l, i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    const est = ppEstado[l] || 'pendiente';
    const esActual = letraActual() === l && !['acierto','fallo'].includes(est);
    ctx.beginPath(); ctx.arc(x, y, 13, 0, 2 * Math.PI);
    ctx.fillStyle = est==='acierto'?'#4CAF50':est==='fallo'?'#F44336':est==='pasada'?'#FF9800':esActual?'#C97B2A':'#FFF3E0';
    ctx.fill();
    ctx.strokeStyle = esActual ? '#5C3D1E' : '#C97B2A';
    ctx.lineWidth = esActual ? 2.5 : 1.5; ctx.stroke();
    ctx.fillStyle = ['acierto','fallo','pasada'].includes(est)||esActual ? 'white' : '#5C3D1E';
    ctx.font = 'bold 10px Georgia'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(l, x, y);
  });
  ctx.fillStyle = '#5C3D1E'; ctx.font = 'bold 22px Georgia'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(ppAcertadas + '/26', cx, cy - 12);
  ctx.font = '13px Georgia'; ctx.fillStyle = '#8B6340';
  ctx.fillText('✅' + ppAcertadas + ' ❌' + ppFalladas, cx, cy + 14);
}

// ══ RANKING ══
function mostrarRanking() {
  mostrarPantalla('pantalla-ranking');
  const r = getRanking();
  const jugadores = ['Federico','Begoña'];
  const iconos = {Federico:'🌟', Begoña:'🌸'};
  let html = '<table class="ranking-tabla"><thead><tr><th>Rosco</th>';
  jugadores.forEach(j => html += '<th>' + iconos[j] + ' ' + j + '</th>');
  html += '</tr></thead><tbody>';
  ROSCOS.forEach((rosco, i) => {
    html += '<tr><td><strong>' + rosco.titulo + '</strong><br><small>' + rosco.dif + '</small></td>';
    const puntos = jugadores.map(j => r[j]?.roscos?.[i]?.mejor || -1);
    const max = Math.max(...puntos);
    jugadores.forEach((j, ji) => {
      const d = r[j]?.roscos?.[i];
      if (!d) { html += '<td style="color:#ccc">—</td>'; return; }
      const corona = (d.mejor === max && max >= 0 && puntos.filter(p=>p===max).length===1) ? ' 👑' : '';
      html += '<td>' + d.mejor + '/26' + corona + '<br><small style="color:#8B6340">' + d.partidas + ' partida' + (d.partidas>1?'s':'') + '</small></td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tabla-ranking').innerHTML = html;
}

function resetRanking() {
  if (confirm('¿Seguro que queréis borrar el ranking del Pasapalabra?')) {
    localStorage.removeItem('ranking_pp');
    mostrarRanking();
  }
}
